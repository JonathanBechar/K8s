# 15. 
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-critical
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: critical
  template:
    metadata:
      labels:
        tier: critical
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - node01
      containers:
      - name: nginx
        image: nginx:latest

---

# 16.
apiVersion: v1
kind: Pod
metadata:
  name: multi-pod
spec:
  containers:
    - name: alpha
      image: nginx:latest
      env:
      - name: alpha
        value: "alpha"
    - name: beta
      image: busybox:latest
      command: ["sleep", "4800"]
      env:
      - name: beta
        value: "beta"