# 1. kubectl create deploy webapp --image=nginx --dry-run -o yaml > webapp.yaml 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: webapp
  name: webapp
spec:
  replicas: 5
  selector:
    matchLabels:
      app: webapp
  strategy: {}
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - image: nginx
        name: nginx
        resources: {}
status: {}

---
# 2. kubectl rollout status deployment/webapp
---
# 3. kubectl get rs --selector=app=webapp
---
# 4. kubectl get rs webapp-645b5b46cd -o yaml > rs.yaml
