---
# 10. kubectl set image deployment/webapp-2 nginx=nginx:1.100
#  a. kubectl get pods # ----> (webapp-2-9b697d97c-w4lmx - ImagePullBackOff)
#  b. kubectl set image deployment/webapp-2 nginx=nginx:1.17.1 | kubectl get pods
#  c. kubectl rollout history deployment/webapp-2 --revision=5
#  d. kubectl rollout history deployment/webapp-2 --revision=5
#  e. kubectl set image deployment/webapp-2 nginx=nginx:latest| kubectl describe pod webapp-2 | grep "Image:"
---
# 11. 
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webapp2-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webapp-2
  minReplicas: 10
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 85

# kubectl get hpa
---
# 13. kubectl delete -f deployment.yaml
---
# 14. kubectl create job hello-job --image=busybox --dry-run -o yaml -- echo "Hello I am from job" > hello-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: hello-job
spec:
  completions: 10
  parallelism: 1
  template:
    metadata: {}
    spec:
      containers:
      - command:
        - echo
        - Hello I am from job
        image: busybox
        name: hello-job
        resources: {}
      restartPolicy: Never
status: {}
