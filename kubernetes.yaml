# 8.
apiVersion: v1
kind: Pod
metadata:
  name: static-busybox
spec:
  tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  containers:
    - name: busybox
      image: busybox:latest
      command: ["sleep", "1000"]

