# 10.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-analytics
spec:
  storageClassName: manual
  capacity:
    storage: 100Mi
  accessModes:
    - ReadWriteMany
  hostPath:
    path: "/pv/data-analytics"

---

# 11. 
apiVersion: v1
kind: Pod
metadata:
  name: redis-storage-yonatan
spec:
  containers:
  - name: redis
    image: redis:alpine
    volumeMounts:
    - name: redis-volume
      mountPath: /data/redis
  volumes:
  - name: redis-volume
    emptyDir: {}

---

# 12. 
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pv-claim
spec:
  volumeName: pv-1
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: use-pvspec-yonatan
  labels:
    run: use-pv
spec:
  containers:
  - name: use-pv
    image: nginx
    volumeMounts:
    - name: pv-storage
      mountPath: /data
  volumes:
  - name: pv-storage
    persistentVolumeClaim:
      claimName: pv-claim
  dnsPolicy: ClusterFirst
  restartPolicy: Always

---

