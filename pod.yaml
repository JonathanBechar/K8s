apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      tier: test
  template:
    metadata:
      labels:
        tier: test
    spec:
      containers:
      - name: nginx
        image: nginx:latest
---
