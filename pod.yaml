# 15. kubectl label node i-0f0e0f0a170c18ae0 nodeName=nginxnode
---
# 16.
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    run: nginx
spec:
  containers:
  - name: nginx
    image: nginx
  dnsPolicy: ClusterFirst
  restartPolicy: Never
  nodeSelector:
    nodeName: nginxnode

---

