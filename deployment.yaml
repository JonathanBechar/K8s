---
# 5. kubectl delete -f deployment.yaml | kubectl get pods
---
# 6. kubectl create deploy webapp --image=nginx:1.17.1 --dry-run -o yaml > webapp.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: webapp
  name: webapp-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  strategy: {}
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - image: nginx:1.17.1
        name: nginx
        ports:
        - containerPort: 80
        resources: {}
status: {}

